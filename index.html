<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sector 7 - Horror Escape</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
    <script type="importmap">
      {
        "imports": {
          "three": "https://esm.sh/three@0.160.0",
          "three/": "https://esm.sh/three@0.160.0/",
          "tone": "https://esm.sh/tone@14.7.77"
        }
      }
    </script>
    <style>
      html, body { margin: 0; padding: 0; background-color: black; overflow: hidden; font-family: 'Orbitron', sans-serif; color: white; }
      #ui { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; }
      .crosshair { position: absolute; top: 50%; left: 50%; width: 10px; height: 10px; border: 1px solid rgba(255,0,0,0.5); border-radius: 50%; transform: translate(-50%, -50%); }
      #overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); display: flex; flex-direction: column; align-items: center; justify-content: center; pointer-events: auto; z-index: 10; text-align: center;}
      #overlay h1 { color: #ff0000; font-size: 3rem; margin-bottom: 20px; }
      #overlay p { margin-bottom: 30px; line-height: 1.5; max-width: 600px;}
      button { background: #ff0000; color: white; border: none; padding: 15px 40px; font-size: 1.2rem; cursor: pointer; font-family: 'Orbitron'; }
      button:hover { background: #aa0000; }
      #game-status { position: absolute; bottom: 20px; left: 20px; font-size: 1rem; color: #ff0000; text-transform: uppercase; }
      #flash-red { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255, 0, 0, 0.2); display: none; pointer-events: none; z-index: 5; }
    </style>
  </head>
  <body>
    <div id="ui">
      <div class="crosshair"></div>
      <div id="game-status">Sector 7 Lockdown | Stealth Protocol Active</div>
    </div>
    <div id="flash-red"></div>
    <div id="overlay">
      <h1>SECTOR 7</h1>
      <p>Escape the research facility. Find the BLUE keycard to unlock the lift. Watch your noise level—Sprinting attracts unwanted attention.</p>
      <p>Controls: WASD to move, SHIFT to sprint, CTRL to sneak. Click to start.</p>
      <button id="start-btn">INITIATE ESCAPE</button>
    </div>
    <script type="module" src="main.js"></script>
  </body>
</html>
